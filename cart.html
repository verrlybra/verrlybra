<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
        }

        .cart-container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
        }

        .cart-item img {
            width: 80px;
            border-radius: 5px;
        }

        .item-details {
            flex: 1;
            margin-left: 20px;
        }

        .price {
            font-weight: bold;
        }

        .cart-total {
            text-align: right;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .continue {
            background: #ddd;
        }

        .checkout {
            background: black;
            color: white;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="cart-container">

    <h2>Your Shopping Cart</h2>

    <div id="cartItems">

        <!-- Example Item -->
        <div class="cart-item">
            <img src="images/product1.jpg" alt="Product">

            <div class="item-details">
                <h3>Product Name</h3>
                <p>Quantity: 1</p>
            </div>

            <div class="price">$49.99</div>
        </div>

    </div>

    <div class="cart-total">
        <h3>Total: $49.99</h3>
    </div>

    <div class="buttons">

        <button class="btn continue"
                onclick="window.location.href='shop.html'">
            Continue Shopping
        </button>

        <button class="btn checkout"
                onclick="window.location.href='invoice.html'">
            Proceed to Checkout
        </button>

    </div>

</div>

</body>
</html>
