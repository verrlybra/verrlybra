<body>

<div class="cart-container">

    <h1>Your Shopping Cart</h1>

    <div id="cartItems"></div>

    <h2>Total: $<span id="cartTotal">0.00</span></h2>

    <button onclick="window.location.href='shop.html'">
        Continue Shopping
    </button>

    <button onclick="window.location.href='invoice.html'">
        Proceed to Checkout
    </button>

</div>

<!-- Paste Step 3 HERE -->
<script>

let cart = JSON.parse(localStorage.getItem("verrly-cart")) || [];

const cartItems = document.getElementById("cartItems");

let total = 0;

cart.forEach(item => {

    total += item.price * item.quantity;

    cartItems.innerHTML += `
    <div style="display:flex;align-items:center;gap:20px;border-bottom:1px solid #ddd;padding:20px 0;">
        <img src="${item.image}" width="100">
        <div>
            <h3>${item.name}</h3>
            <p>Price: $${item.price}</p>
            <p>Quantity: ${item.quantity}</p>
        </div>
        <div>
            <strong>$${(item.price * item.quantity).toFixed(2)}</strong>
        </div>
    </div>
    `;

});

document.getElementById("cartTotal").textContent = total.toFixed(2);

</script>

</body>
</html>
