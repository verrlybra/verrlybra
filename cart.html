<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Bag — Verrly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --plum:#1c1116; --wine:#6b1f2a; --gold:#c9a66b; --gold-soft:#e3d3ae; --ivory:#f7f2ec;
    --blush:#e9d2ca; --charcoal:#2a2024; --charcoal-soft:#6b6066; --line:rgba(28,17,22,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--ivory); color:var(--charcoal); font-family:'Manrope', sans-serif; padding-bottom:0; min-height:100vh; display:flex; flex-direction:column;}
  h1,h2,.serif{font-family:'Cormorant Garamond', serif;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:800px; margin:0 auto; padding:0 32px;}

  nav{display:flex; align-items:center; justify-content:space-between; padding:22px 32px; max-width:1180px; margin:0 auto; width:100%; gap:24px;}
  .logo{font-family:'Cormorant Garamond', serif; font-size:1.7rem; letter-spacing:0.12em;}
  .nav-links{display:flex; gap:36px; font-size:0.82rem; letter-spacing:0.08em; text-transform:uppercase;}
  .nav-links a{position:relative; padding-bottom:4px;}
  .nav-links a::after{content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--wine); transition:width .3s ease;}
  .nav-links a:hover::after, .nav-links a.active::after{width:100%;}
  .cart-link{position:relative; display:flex; align-items:center;}
  .cart-link svg{width:20px; height:20px; stroke:var(--charcoal);}
  .cart-count{position:absolute; top:-6px; right:-8px; background:var(--wine); color:var(--ivory); font-size:0.62rem; font-weight:700; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .menu-toggle{display:none; background:none; border:none; cursor:pointer;}
  .menu-toggle svg{width:24px; height:24px; stroke:var(--charcoal);}
  @media(max-width:820px){
    .nav-links{display:none; flex-direction:column; position:fixed; inset:0; background:var(--ivory); z-index:100; justify-content:center; align-items:center; gap:32px; font-size:1.2rem;}
    .nav-links.active{display:flex;}
    .menu-toggle{display:block;}
  }

  main{flex:1;}
  .cart-title{text-align:center; padding:50px 0 10px; font-size:clamp(2rem,4vw,2.6rem); color:var(--wine);}
  .cart-sub{text-align:center; color:var(--charcoal-soft); font-size:0.9rem; margin-bottom:40px;}
  .cart-container{background:#fff; padding:32px; border-radius:6px; border:1px solid var(--line); box-shadow:0 30px 60px -35px rgba(28,17,22,0.25); margin-bottom:60px;}
  .cart-item{display:flex; justify-content:space-between; align-items:center; padding:20px 0; border-bottom:1px solid var(--line); gap:16px;}
  .cart-item:last-of-type{border-bottom:none;}
  .item-details h4{font-size:1.1rem; font-weight:600; font-family:'Cormorant Garamond', serif; color:var(--plum);}
  .item-details p{font-size:0.85rem; opacity:0.55; margin-top:2px;}
  .remove-btn{font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--wine); background:none; border:none; cursor:pointer; margin-top:8px; display:block; font-weight:600;}
  .remove-btn:hover{text-decoration:underline;}
  .checkout-section{margin-top:32px; text-align:right; border-top:2px solid var(--charcoal); padding-top:24px;}
  .total-row{font-size:1.3rem; font-weight:600; margin-bottom:20px; font-family:'Cormorant Garamond', serif; color:var(--plum);}
  .checkout-btn{background:var(--wine); color:var(--ivory); padding:16px 40px; border:none; font-size:0.85rem; text-transform:uppercase; letter-spacing:0.12em; border-radius:2px; cursor:pointer; font-weight:600; transition:background .2s ease, transform .2s ease;}
  .checkout-btn:hover{background:var(--plum); transform:translateY(-2px);}
  .empty-state{text-align:center; padding:50px 20px;}
  .empty-state svg{width:52px; height:52px; stroke:var(--gold); margin:0 auto 20px;}
  .empty-state p{color:var(--charcoal-soft); margin-bottom:26px;}
  .continue-btn{display:inline-block; background:var(--charcoal); color:var(--ivory); padding:14px 30px; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.08em; border-radius:2px; transition:background .2s ease;}
  .continue-btn:hover{background:var(--wine);}

  footer{background:var(--plum); color:rgba(247,242,236,0.6); padding:40px 0 22px; text-align:center; border-top:1px solid rgba(201,166,107,0.18);}
  footer .logo{color:var(--ivory); margin-bottom:10px; display:block;}
  footer p{font-size:0.78rem;}
</style>
</head>
<body>

<nav>
  <div class="logo"><a href="index.html">VERRLY</a></div>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="fabric.html">The Fabric</a>
    <a href="journal.html">Journal</a>
    <a href="cart.html" class="active">Bag</a>
  </div>
  <a href="cart.html" class="cart-link" aria-label="View bag">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    <span class="cart-count" id="cartCountNav">0</span>
  </a>
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
</nav>

<main>
  <h1 class="cart-title">Shopping Bag</h1>
  <p class="cart-sub">Review your selection before checkout.</p>

  <div class="wrap">
    <div class="cart-container">
      <div id="cart-items-wrapper"><!-- injected --></div>

      <div id="checkout-block" class="checkout-section" style="display:none;">
        <div class="total-row">Total: <span id="cart-total">$0.00</span></div>
        <button class="checkout-btn" onclick="alert('Order successfully processed! Thank you for shopping with Verrly.'); localStorage.removeItem('verrly-cart'); renderCart();">Proceed to Checkout</button>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="logo serif">VERRLY</div>
  <p>© 2026 Verrly. Quiet luxury lingerie.</p>
</footer>

<script>
  function renderCart() {
    let cart = JSON.parse(localStorage.getItem('verrly-cart')) || [];
    let wrapper = document.getElementById('cart-items-wrapper');
    let totalContainer = document.getElementById('cart-total');
    let checkoutBlock = document.getElementById('checkout-block');

    if (cart.length === 0) {
      checkoutBlock.style.display = 'none';
      wrapper.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <p>Your luxury capsule bag is currently empty.</p>
          <a href="shop.html" class="continue-btn">Continue Shopping</a>
        </div>`;
      updateCartCount();
      return;
    }

    checkoutBlock.style.display = 'block';
    wrapper.innerHTML = "";
    let grandTotal = 0;

    cart.forEach((item, index) => {
      grandTotal += item.price * item.quantity;
      wrapper.innerHTML += `
        <div class="cart-item">
          <div class="item-details">
            <h4>${item.name}</h4>
            <p>Quantity: ${item.quantity}</p>
            <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
          </div>
          <div style="font-weight:600; color:var(--wine);">$${(item.price * item.quantity).toFixed(2)}</div>
        </div>
      `;
    });

    totalContainer.textContent = `$${grandTotal.toFixed(2)}`;
    updateCartCount();
  }

  function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem('verrly-cart')) || [];
    cart.splice(index, 1);
    localStorage.setItem('verrly-cart', JSON.stringify(cart));
    renderCart();
  }

  function updateCartCount(){
    const cart = JSON.parse(localStorage.getItem('verrly-cart')) || [];
    const count = cart.reduce((sum,i)=>sum+(i.quantity||1),0);
    const el = document.getElementById('cartCountNav');
    if(el) el.textContent = count;
  }

  renderCart();

  const menuToggle = document.getElementById('menuToggle');
  const navLinks = document.getElementById('navLinks');
  menuToggle.addEventListener('click', () => navLinks.classList.toggle('active'));
</script>
</body>
</html>
