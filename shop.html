<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop the Collection — Verrly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --plum:#1c1116; --wine:#6b1f2a; --wine-light:#8c3341; --gold:#c9a66b; --gold-soft:#e3d3ae;
    --ivory:#f7f2ec; --blush:#e9d2ca; --charcoal:#2a2024; --charcoal-soft:#6b6066; --line:rgba(28,17,22,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--ivory); color:var(--charcoal); font-family:'Manrope', sans-serif; line-height:1.6;}
  h1,h2,h3,.serif{font-family:'Cormorant Garamond', serif; font-weight:500;}
  a{color:inherit; text-decoration:none;}
  img{max-width:100%; display:block;}
  .wrap{max-width:1180px; margin:0 auto; padding:0 32px;}
  .eyebrow{font-size:0.76rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--wine); font-weight:600; display:flex; align-items:center; gap:12px; justify-content:center;}
  .eyebrow::before{content:''; width:22px; height:1px; background:var(--wine);}

  nav{display:flex; align-items:center; justify-content:space-between; padding:22px 32px; max-width:1180px; margin:0 auto; gap:24px;}
  .logo{font-family:'Cormorant Garamond', serif; font-size:1.7rem; letter-spacing:0.12em;}
  .nav-links{display:flex; gap:36px; font-size:0.82rem; letter-spacing:0.08em; text-transform:uppercase;}
  .nav-links a{position:relative; padding-bottom:4px;}
  .nav-links a::after{content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--wine); transition:width .3s ease;}
  .nav-links a:hover::after, .nav-links a.active::after{width:100%;}
  .nav-right{display:flex; align-items:center; gap:20px;}
  .cart-link{position:relative; display:flex; align-items:center;}
  .cart-link svg{width:20px; height:20px; stroke:var(--charcoal);}
  .cart-count{position:absolute; top:-6px; right:-8px; background:var(--wine); color:var(--ivory); font-size:0.62rem; font-weight:700; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .menu-toggle{display:none; background:none; border:none; cursor:pointer; padding:4px;}
  .menu-toggle svg{width:24px; height:24px; stroke:var(--charcoal);}
  @media(max-width:820px){
    .nav-links{display:none; flex-direction:column; position:fixed; inset:0; background:var(--ivory); z-index:100; justify-content:center; align-items:center; gap:32px; font-size:1.2rem;}
    .nav-links.active{display:flex;}
    .menu-toggle{display:block;}
  }

  .shop-hero{text-align:center; padding:70px 0 50px; background:linear-gradient(180deg, var(--blush), var(--ivory));}
  .shop-hero h1{font-size:clamp(2.2rem,4vw,3.2rem); color:var(--plum); margin:14px 0 12px;}
  .shop-hero p{color:var(--charcoal-soft); max-width:46ch; margin:0 auto;}

  .filters{display:flex; justify-content:center; gap:12px; flex-wrap:wrap; padding:30px 0 10px;}
  .filter-btn{border:1px solid var(--line); background:#fff; padding:9px 20px; font-size:0.78rem; letter-spacing:0.06em; text-transform:uppercase; border-radius:999px; cursor:pointer; transition:all .2s ease; color:var(--charcoal-soft);}
  .filter-btn:hover{border-color:var(--wine); color:var(--wine);}
  .filter-btn.active{background:var(--wine); color:var(--ivory); border-color:var(--wine);}

  .product-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:26px; padding:40px 0 100px;}
  .product-card{background:#fff; border-radius:6px; overflow:hidden; transition:transform .4s ease, box-shadow .4s ease; opacity:0; transform:translateY(20px); animation:cardIn .6s ease forwards;}
  @keyframes cardIn{to{opacity:1; transform:translateY(0);}}
  .product-card:hover{transform:translateY(-8px); box-shadow:0 30px 55px -24px rgba(28,17,22,0.28);}
  .product-thumb{position:relative; aspect-ratio:4/5; overflow:hidden; background:var(--blush);}
  .product-thumb img{width:100%; height:100%; object-fit:cover; transition:transform .6s ease;}
  .product-card:hover .product-thumb img{transform:scale(1.06);}
  .product-badge{position:absolute; top:12px; left:12px; background:var(--wine); color:var(--ivory); font-size:0.62rem; text-transform:uppercase; letter-spacing:0.06em; padding:5px 10px; border-radius:2px; font-weight:700;}
  .product-info{padding:18px 20px 22px;}
  .pname{font-family:'Cormorant Garamond', serif; font-size:1.2rem; color:var(--plum);}
  .pmeta{font-size:0.75rem; color:var(--charcoal-soft); margin:3px 0 10px; text-transform:uppercase; letter-spacing:0.05em;}
  .price-row{display:flex; align-items:center; justify-content:space-between;}
  .pprice{font-weight:700; color:var(--wine);}
  .add-btn{background:var(--charcoal); color:var(--ivory); border:none; padding:9px 16px; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.06em; border-radius:2px; cursor:pointer; font-weight:600; transition:background .2s ease;}
  .add-btn:hover{background:var(--wine);}
  .add-btn.added{background:var(--gold); color:var(--plum);}

  @media(max-width:1000px){.product-grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:560px){.product-grid{grid-template-columns:1fr;}}

  footer{background:var(--plum); color:rgba(247,242,236,0.6); padding:50px 0 24px; text-align:center; border-top:1px solid rgba(201,166,107,0.18); margin-top:0;}
  footer a{color:rgba(247,242,236,0.6);}
  footer .logo{color:var(--ivory); margin-bottom:12px; display:block;}
  footer p{font-size:0.8rem;}
</style>
</head>
<body>

<nav>
  <div class="logo"><a href="index.html">VERRLY</a></div>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="shop.html" class="active">Shop</a>
    <a href="fabric.html">The Fabric</a>
    <a href="journal.html">Journal</a>
    <a href="cart.html">Bag</a>
  </div>
  <div class="nav-right">
    <a href="cart.html" class="cart-link" aria-label="View bag">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span class="cart-count" id="cartCount">0</span>
    </a>
  </div>
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
</nav>

<section class="shop-hero">
  <div class="eyebrow">The Collection</div>
  <h1>Four silhouettes. One fabric philosophy.</h1>
  <p>Each style is cut from the same breathable lace and second-skin microfiber — choose your fit, then your colorway.</p>
</section>

<div class="wrap">
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="bralette">Bralettes</button>
    <button class="filter-btn" data-filter="plunge">Plunge</button>
    <button class="filter-btn" data-filter="balconette">Balconette</button>
  </div>

  <div class="product-grid" id="productGrid">
    <!-- populated by JS -->
  </div>
</div>

<footer>
  <div class="logo serif">VERRLY</div>
  <p>© 2026 Verrly. Quiet luxury lingerie.</p>
</footer>

  <script>
    
const products = [

{
    id:'wine-bralette',
    name:'The Verrly Bralette',
    color:'Wine',
    price:1999,
    type:'bralette',
    image:'image_5c7045.jpg',
    filter:'saturate(1.15) contrast(1.03)'
},

{
    id:'noir-bralette',
    name:'The Verrly Bralette',
    color:'Noir',
    price:1999,
    type:'bralette',
    image:'image_5c7045.jpg',
    filter:'brightness(0.72) contrast(1.15) saturate(1.1)'
},

{
    id:'ivory-plunge',
    name:'Second-Skin Plunge',
    color:'Ivory',
    price:2199,
    type:'plunge',
    image:'image_5c7045.jpg',
    filter:'grayscale(0.55) brightness(1.12) contrast(0.95)'
},

{
    id:'wine-plunge',
    name:'Second-Skin Plunge',
    color:'Wine',
    price:2199,
    type:'plunge',
    image:'image_5c7045.jpg',
    filter:'saturate(1.2) brightness(0.95)'
},

{
    id:'blush-balc',
    name:'Lace Balconette',
    color:'Blush',
    price:2499,
    type:'balconette',
    image:'image_5c7045.jpg',
    filter:'hue-rotate(-18deg) saturate(0.85) brightness(1.08)'
},

{
    id:'gold-balc',
    name:'Lace Balconette',
    color:'Champagne',
    price:2499,
    type:'balconette',
    image:'image_5c7045.jpg',
    filter:'sepia(0.35) saturate(1.1) brightness(1.05)'
},

{
    id:'noir-base',
    name:'The Wireless Base',
    color:'Noir',
    price:1799,
    type:'bralette',
    image:'image_5c7045.jpg',
    filter:'brightness(0.68) contrast(1.2)'
},

{
    id:'ivory-base',
    name:'The Wireless Base',
    color:'Ivory',
    price:1799,
    type:'bralette',
    image:'image_5c7045.jpg',
    filter:'grayscale(0.6) brightness(1.15)'
}

];
    const grid = document.getElementById('productGrid');
    
  function render(filter){
    grid.innerHTML = '';
    products
      .filter(p => filter === 'all' || p.type === filter)
      .forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.style.animationDelay = (idx * 0.06) + 's';
        card.innerHTML = `
          <div class="product-thumb">
            <span class="product-badge">${p.color}</span>
            <img src="${p.image}" alt="${p.name} in ${p.color}" style="filter:${p.filter};">
          </div>
          <div class="product-info">
            <div class="pname">${p.name}</div>
            <div class="pmeta">${p.color} · ${p.type}</div>
            <div class="price-row">
              <div class="pprice">₹${p.price.toLocaleString('en-IN')}</div>
              <button class="add-btn" data-id="${p.id}">Add to Bag</button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

    grid.querySelectorAll('.add-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const product = products.find(p => p.id === btn.dataset.id);
        addToCart(product);
        btn.textContent = 'Added ✓';
        btn.classList.add('added');
        setTimeout(() => { btn.textContent = 'Add to Bag'; btn.classList.remove('added'); }, 1400);
      });
    });
  }

 
 
    
    function addToCart(product){

   let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const existing = cart.find(item => item.id === product.id);

    if(existing){

        existing.quantity++;

    }else{

   cart.push({
    id: product.id,
    name: `${product.name} — ${product.color}`,
    price: product.price,
    quantity: 1,
    image: product.image,
    category: product.type
});

    }

    localStorage.setItem("cart", JSON.stringify(cart));

    updateCartCount();

}
 function updateCartCount(){
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const count = cart.reduce((sum,i)=>sum+(i.quantity||1),0);
    document.getElementById('cartCount').textContent = count;
}

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active');
        });

        btn.classList.add('active');
        render(btn.dataset.filter);
    });
});

render('all');
updateCartCount();

const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

if(menuToggle){
    menuToggle.addEventListener("click", () => {
        navLinks.classList.toggle("active");
    });
}

</script>

</body>
</html>
