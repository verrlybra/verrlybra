<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verrly | Invoice</title>

<style>
body{
    margin:0;
    background:#f7f2ec;
    font-family:Arial,Helvetica,sans-serif;
    color:#2a2024;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 15px 35px rgba(0,0,0,.1);
}

h1{
    color:#6b1f2a;
    margin-bottom:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:25px;
}

th,td{
    padding:15px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#6b1f2a;
    color:white;
}

.total{
    text-align:right;
    font-size:24px;
    margin-top:25px;
    color:#6b1f2a;
    font-weight:bold;
}

.section{
    margin-top:35px;
}

input,textarea,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    padding:15px 30px;
    background:#6b1f2a;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#872d3a;
}

@media print{
button{
display:none;
}
}
</style>

</head>
<body>

<div class="container">

<h1>VERRLY</h1>

<p><strong>Invoice #</strong> <span id="invoiceNo"></span></p>

<p><strong>Date:</strong> <span id="date"></span></p>

<div class="section">

<h2>Billing Details</h2>

<input id="name" placeholder="Full Name">

<input id="email" placeholder="Email">

<input id="phone" placeholder="Phone">

<textarea id="address" placeholder="Address"></textarea>

</div>

<div class="section">

<h2>Payment Method</h2>

<select>

<option>Credit / Debit Card</option>

<option>PayPal</option>

<option>Apple Pay</option>

<option>Google Pay</option>

<option>Cash on Delivery</option>

</select>

</div>

<div class="section">

<h2>Order Summary</h2>

<table>

<thead>

<tr>

<th>Product</th>

<th>Qty</th>

<th>Price</th>

<th>Total</th>

</tr>

</thead>

<tbody id="items">

</tbody>

</table>

<div class="total">

Grand Total:
$<span id="grandTotal">0.00</span>

</div>

</div>

<div style="margin-top:40px;display:flex;gap:15px;">

<button onclick="window.print()">

Print / Save PDF

</button>

<button onclick="alert('Thank you for shopping with Verrly!')">

Confirm Order

</button>

</div>

</div>

<script>

document.getElementById("invoiceNo").textContent=
"INV-"+Math.floor(Math.random()*900000+100000);

document.getElementById("date").textContent=
new Date().toLocaleDateString();

let cart=
JSON.parse(localStorage.getItem("verrly-cart"))||[];

let tbody=document.getElementById("items");

let total=0;

cart.forEach(item=>{

let qty=item.quantity||1;

let price=item.price||0;

let row=`
<tr>
<td>${item.name}</td>
<td>${qty}</td>
<td>$${price.toFixed(2)}</td>
<td>$${(qty*price).toFixed(2)}</td>
</tr>
`;

tbody.innerHTML+=row;

total+=qty*price;

});

document.getElementById("grandTotal").textContent=
total.toFixed(2);

</script>

</body>
</html>
