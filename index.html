<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verrly | Quiet Luxury Lingerie</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f5f2; --text: #1a1a1a; --accent: #c9a66b; --overlay: rgba(255,255,255,0.7);
            --transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; line-height: 1.6; overflow-x: hidden; }
        
        /* Typography */
        h1, h2 { font-family: 'Cormorant Garamond', serif; font-weight: 300; line-height: 1.1; }
        
        /* Hero Section - The Spotlight */
        .hero { height: 90vh; display: flex; align-items: center; justify-content: center; position: relative; padding: 0 5%; overflow: hidden; }
        .hero::before { content: ''; position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, var(--accent), transparent 70%); opacity: 0.15; filter: blur(80px); }
        .hero-content { z-index: 2; text-align: center; max-width: 800px; }
        .hero h1 { font-size: clamp(3rem, 8vw, 6rem); margin-bottom: 2rem; }
        
        /* Product Cards - Glassmorphism */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 100px 5%; max-width: 1400px; margin: auto; }
        .card { background: rgba(255,255,255,0.5); backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.05); padding: 20px; transition: var(--transition); }
        .card:hover { transform: translateY(-15px); border-color: var(--accent); }
        .img-wrap { overflow: hidden; margin-bottom: 20px; }
        .img-wrap img { width: 100%; transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .card:hover img { transform: scale(1.05); }

        /* Scroll Animations */
        .reveal { opacity: 0; transform: translateY(60px); transition: var(--transition); }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content reveal">
            <h1>The Art of the <br><i>Second Skin</i></h1>
            <p>Quiet luxury. Unrivaled support. Designed to disappear.</p>
        </div>
    </section>

    <div class="grid">
        <div class="card reveal">
            <div class="img-wrap"><img src="image_5c7045.jpg" alt="Luxury Lingerie"></div>
            <h2>The Signature Bralette</h2>
            <p>Silk-blend lace for the modern minimalist.</p>
        </div>
        <div class="card reveal">
            <div class="img-wrap"><img src="image_5c7045.jpg" alt="Luxury Lingerie"></div>
            <h2>The Plunge</h2>
            <p>Tensor-fabric support without the wire.</p>
        </div>
        <div class="card reveal">
            <div class="img-wrap"><img src="image_5c7045.jpg" alt="Luxury Lingerie"></div>
            <h2>The Balconette</h2>
            <p>Sculpted comfort for every day.</p>
        </div>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
