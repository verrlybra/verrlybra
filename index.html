<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica', sans-serif; overflow: hidden; }

        /* Background Video */
        #bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        /* Spotlight Overlay */
        .intro-overlay {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4); /* Darkens video for better contrast */
            color: white;
            animation: fadeIn 2s ease-in-out;
        }

        .product-spotlight {
            width: 400px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Background Video -->
    <video autoplay muted loop id="bg-video">
        <source src="your-video-file.mp4" type="video/mp4">
    </video>

    <!-- Content -->
    <div class="intro-overlay">
        <img src="product-image.png" class="product-spotlight" alt="Product">
        <h1>THE LUNA COLLECTION</h1>
        <p>Crafted for Confidence</p>
    </div>

</body>
</html>
